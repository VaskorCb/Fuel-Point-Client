<svg width="480" height="400" viewBox="0 0 480 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fuel station scene - modern flat style -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.5" stop-color="#0D9488"/>
      <stop offset="1" stop-color="#115E59"/>
    </linearGradient>
    <linearGradient id="pump-body" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop stop-color="#134E4A"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="480" height="400" fill="url(#sky)"/>
  <!-- Ground -->
  <path d="M0 280 Q120 260 240 280 T480 280 V400 H0 Z" fill="url(#ground)" opacity="0.9"/>
  <!-- Pump 1 -->
  <rect x="120" y="140" width="50" height="120" rx="4" fill="url(#pump-body)"/>
  <rect x="115" y="155" width="60" height="25" rx="2" fill="url(#pump-body)"/>
  <rect x="130" y="165" width="30" height="15" rx="1" fill="#99F6E4"/>
  <path d="M145 180 L165 200 V210 H125 V200 Z" fill="url(#pump-body)"/>
  <circle cx="165" cy="250" r="12" fill="#0F766E"/>
  <circle cx="165" cy="250" r="6" fill="#5EEAD4"/>
  <!-- Pump 2 (smaller, back) -->
  <rect x="280" y="180" width="40" height="100" rx="4" fill="url(#pump-body)" opacity="0.85"/>
  <rect x="276" y="192" width="48" height="20" rx="2" fill="url(#pump-body)" opacity="0.85"/>
  <circle cx="308" cy="270" r="10" fill="#0F766E" opacity="0.9"/>
  <!-- Fuel drop -->
  <path d="M380 120 C380 100 400 90 400 110 C400 130 380 140 380 120 Z" fill="#5EEAD4" opacity="0.9"/>
  <path d="M390 100 C390 85 405 80 405 95 C405 110 390 115 390 100 Z" fill="#99F6E4" opacity="0.8"/>
</svg>
